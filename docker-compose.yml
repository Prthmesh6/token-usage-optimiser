version: '3.8'
services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: gateway-redis
    ports:
      - "6379:6379"    # Core Redis port
      - "8001:8001"    # RedisInsight GUI (View your vectors in the browser!)
    volumes:
      - redis-data:/data

volumes:
  redis-data: